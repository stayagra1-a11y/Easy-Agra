name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build packages
        run: pnpm --filter @workspace/api-spec run build

      - name: Build web app
        run: |
          cd artifacts/easy-agra
          pnpm run build

      - name: Sync Capacitor
        run: |
          cd artifacts/easy-agra
          npx cap sync

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build APK
        run: |
          cd artifacts/easy-agra/android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: easy-agra-apk
          path: artifacts/easy-agra/android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
