name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build packages
        run: pnpm --filter @workspace/api-spec run build

      - name: Build web app
        env:
          VITE_API_URL: https://4154997e-dd6f-463a-982b-1bf616112852-00-2bpkmfjoppi1v.sisko.replit.dev
        run: |
          cd artifacts/easy-agra
          pnpm run build

      - name: Verify web build output
        run: |
          ls -la artifacts/easy-agra/dist/public/ | head -10 || echo "dist/public not found"

      - name: Sync Capacitor
        run: |
          cd artifacts/easy-agra
          pnpm exec cap sync

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build APK
        run: |
          cd artifacts/easy-agra/android
          ./gradlew assembleDebug

      - name: Build AAB (Play Store)
        run: |
          cd artifacts/easy-agra/android
          ./gradlew bundleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: easy-agra-apk
          path: artifacts/easy-agra/android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: easy-agra-aab
          path: artifacts/easy-agra/android/app/build/outputs/bundle/debug/*.aab
          retention-days: 30
