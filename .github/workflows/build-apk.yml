name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build packages
        run: pnpm --filter @workspace/api-spec run build

      - name: Build web app
        env:
          VITE_API_URL: https://4154997e-dd6f-463a-982b-1bf616112852-00-2bpkmfjoppi1v.sisko.replit.dev
        run: |
          cd artifacts/easy-agra
          pnpm run build

      - name: Verify web build output
        run: |
          ls -la artifacts/easy-agra/dist/public/ | head -10 || echo "dist/public not found"

      - name: Sync Capacitor
        run: |
          cd artifacts/easy-agra
          pnpm exec cap sync

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > artifacts/easy-agra/android/app/upload-keystore.jks
          ls -la artifacts/easy-agra/android/app/upload-keystore.jks

      - name: Build Signed APK (Release)
        env:
          ANDROID_KEYSTORE_PATH: upload-keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_ALIAS_PASSWORD }}
        run: |
          cd artifacts/easy-agra/android
          ./gradlew assembleRelease

      - name: Build Signed AAB (Play Store)
        env:
          ANDROID_KEYSTORE_PATH: upload-keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_ALIAS_PASSWORD }}
        run: |
          cd artifacts/easy-agra/android
          ./gradlew bundleRelease

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: easy-agra-signed-apk
          path: artifacts/easy-agra/android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Upload Signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: easy-agra-signed-aab
          path: artifacts/easy-agra/android/app/build/outputs/bundle/release/*.aab
          retention-days: 30

      - name: Create GitHub Release with APK & AAB
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v$(date +%Y%m%d)-$(git rev-parse --short HEAD)"
          APK=$(ls artifacts/easy-agra/android/app/build/outputs/apk/release/*.apk | head -1)
          AAB=$(ls artifacts/easy-agra/android/app/build/outputs/bundle/release/*.aab | head -1)
          echo "Creating release $VERSION"
          echo "APK: $APK"
          echo "AAB: $AAB"
          gh release create "$VERSION" \
            "$APK#easy-agra-signed.apk" \
            "$AAB#easy-agra-signed.aab" \
            --title "Easy Agra $VERSION" \
            --notes "Signed APK & AAB for Play Store publishing. Package: com.easyagra.app" \
            --repo ${{ github.repository }}
