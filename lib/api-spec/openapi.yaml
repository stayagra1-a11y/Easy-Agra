components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    User:
      type: object
      properties:
        id:
          type: integer
        fullName:
          type: string
        email:
          type: string
        mobile:
          type: string
        city:
          type: ["string", "null"]
        state:
          type: ["string", "null"]
        role:
          type: string
          enum: [super_admin, admin, hotel_owner, restaurant_owner, spa_owner, customer]
        status:
          type: string
          enum: [pending, active, suspended, rejected]
        profilePhoto:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - fullName
        - email
        - mobile
        - role
        - status
        - createdAt
        - updatedAt

    UsersPage:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/User"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required:
        - users
        - total
        - page
        - limit

    RegisterInput:
      type: object
      properties:
        fullName:
          type: string
        email:
          type: string
        mobile:
          type: string
        password:
          type: string
        city:
          type: string
        state:
          type: string
      required:
        - fullName
        - email
        - mobile
        - password

    LoginInput:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
        rememberMe:
          type: boolean
      required:
        - email
        - password

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        message:
          type: string
      required:
        - user
        - message

    ForgotPasswordInput:
      type: object
      properties:
        email:
          type: string
      required:
        - email

    ResetPasswordInput:
      type: object
      properties:
        token:
          type: string
        password:
          type: string
      required:
        - token
        - password

    UserUpdate:
      type: object
      properties:
        fullName:
          type: string
        mobile:
          type: string
        city:
          type: string
        state:
          type: string

    UserStatusUpdate:
      type: object
      properties:
        status:
          type: string
