    <!-- Cache buster: force fresh load every deploy -->
    <script>
      (function() {
        if (sessionStorage.getItem('easyagra_cached')) return;
        sessionStorage.setItem('easyagra_cached', '1');
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            regs.forEach(function(r) { r.unregister(); });
            if ('caches' in window) {
              caches.keys().then(function(names) {
                names.forEach(function(n) { caches.delete(n); });
              });
            }
          });
        }
        if (!location.search.match(/[?&]nocache=/)) {
          var sep = location.search ? '&' : '?';
          location.replace(location.href + sep + 'nocache=' + Date.now());
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
